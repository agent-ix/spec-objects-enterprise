manifest_version: 1.0.0
name: spec-objects-enterprise
version: 0.1.0
description: 'Filament Module: tier-2 enterprise-architecture ObjectTypes (capability, business_function, value_stream, decision, objective, principle, kpi)'
archetypes: []
grammars: []
artifact_types: []
lint_rules: []
object_types:
- name: capability
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: &id001
          from: frontmatter_field
          path:
          - id
          required: false
        title: &id002
          from: frontmatter_field
          path:
          - title
          required: false
        artifact_type: &id003
          from: frontmatter_field
          path:
          - artifact_type
          required: false
        sub_capabilities:
          from: section_body
          after_heading: Sub-capabilities
          required: false
- name: business_function
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        description_body:
          from: section_body
          after_heading: Description
          required: false
- name: value_stream
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        stages:
          from: section_body
          after_heading: Stages
          required: false
- name: decision
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        decision_body:
          from: section_body
          after_heading: Decision
          required: false
- name: objective
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        metric:
          from: frontmatter_field
          path:
          - metric
          required: false
        target:
          from: frontmatter_field
          path:
          - target
          required: false
        deadline:
          from: frontmatter_field
          path:
          - deadline
          required: false
- name: principle
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        rationale:
          from: section_body
          after_heading: Rationale
          required: false
- name: kpi
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        artifact_type: *id003
        metric:
          from: frontmatter_field
          path:
          - metric
          required: false
        target:
          from: frontmatter_field
          path:
          - target
          required: false
        threshold:
          from: frontmatter_field
          path:
          - threshold
          required: false
